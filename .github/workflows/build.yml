name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Download Dalamud
        run: |
          wget -q https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -O /tmp/dalamud.zip
          unzip -q /tmp/dalamud.zip -d /tmp/dalamud

      - name: Restore
        run: dotnet restore SharkChat/SharkChat.csproj
        env:
          DALAMUD_HOME: /tmp/dalamud

      - name: Build
        run: dotnet build SharkChat/SharkChat.csproj --no-restore --configuration Release
        env:
          DALAMUD_HOME: /tmp/dalamud

      - name: Package
        run: |
          VERSION=$(grep '<Version>' SharkChat/SharkChat.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | tr -d '[:space:]')
          mkdir -p dist
          find SharkChat/bin/Release -name "SharkChat.dll" | head -1 | xargs -I{} cp {} dist/
          jq --arg v "$VERSION" '.AssemblyVersion = $v' SharkChat/SharkChat.json > dist/SharkChat.json
          cd dist && zip -r ../latest.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.zip
